name: CI API Crédit

on: # quand le pipeline doit s'exécuter, dans le projet:
  push: 
    branches:
      - develop 
      - "feature/**"
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  unit-tests:
    name: Tests unitaires 
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install Poetry 
        run: pip install poetry 
      
      - name: Install dependencies with Poetry 
        run: poetry install --no-interaction --no-root 
      
      - name: Add project root to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run unit tests with coverage 
        run: poetry run pytest tests/unitaires --cov=App --cov-report=xml --cov-report=term-missing 

  functional-tests: 
    name: Tests fonctionnels API 
    runs-on: ubuntu-latest 
    needs: unit-tests 
    
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-python@v5 
        with: 
          python-version: "3.11" 
        
      - name: Install Poetry 
        run: pip install poetry 
        
      - name: Install dependencies 
        run: poetry install --no-interaction --no-root 
      
      - name: Add project root to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV 

      - name: Run functional tests
        run: poetry run pytest tests/fonctionnels --cov=App --cov-append --cov-report=xml --cov-report=term-missing
        
      - name: Upload final merged coverage 
        uses: actions/upload-artifact@v4 
        with: 
          name: final-coverage 
          path: coverage.xml